<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GTA 6 Hub</title>

<style>

body{
    margin:0;
    background:#0f1117;
    color:white;
    font-family:Arial, sans-serif;
}

header{
    background:#1b1e29;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
    color:#ff4fd8;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    text-align:center;
    padding:100px 20px;
}

.hero h1{
    font-size:60px;
    margin-bottom:15px;
}

.hero p{
    color:#bdbdbd;
    font-size:20px;
}

button{
    margin-top:30px;
    padding:15px 35px;
    border:none;
    border-radius:12px;
    background:#ff4fd8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff2cc4;
}

</style>

</head>

<body>

<header>

<div class="logo">
GTA6 HUB
</div>

<nav>
<a href="#">Početna</a>
<a href="#">Mapa</a>
<a href="#">Vesti</a>
<a href="#">Forum</a>
</nav>

</header>

<section class="hero">

<h1>Dobrodošla na GTA 6 Hub</h1>

<p>Sve o GTA 6 na jednom mestu.</p>

<button>Uđi u Hub</button>

</section>

</body>
</html>
